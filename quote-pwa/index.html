<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>견적 요청</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="견적 요청" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    body { -webkit-tap-highlight-color: transparent; }
    /* Safe area for iPhone notch */
    .safe-top    { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ── 웹훅 URL ─────────────────────────────────────────────────────────────────
const WEBHOOK_URL = "https://hanjiho.app.n8n.cloud/webhook/tally-invoice";

// ── 아이콘 ───────────────────────────────────────────────────────────────────
const MessageIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
);
const MicIcon = ({ recording }) => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill={recording ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
    <line x1="12" y1="19" x2="12" y2="23"/>
    <line x1="8" y1="23" x2="16" y2="23"/>
  </svg>
);
const FormIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="16" y1="13" x2="8" y2="13"/>
    <line x1="16" y1="17" x2="8" y2="17"/>
    <polyline points="10 9 9 9 8 9"/>
  </svg>
);
const SendIcon = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <line x1="22" y1="2" x2="11" y2="13"/>
    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
  </svg>
);
const TrashIcon = () => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="3 6 5 6 21 6"/>
    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
    <path d="M10 11v6M14 11v6"/>
    <path d="M9 6V4h6v2"/>
  </svg>
);

// ── 성공 화면 ─────────────────────────────────────────────────────────────────
const SuccessScreen = ({ onReset }) => (
  <div className="flex flex-col items-center justify-center py-12 space-y-4">
    <div className="w-20 h-20 rounded-full bg-green-50 flex items-center justify-center">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h3 className="text-lg font-semibold text-gray-800">견적 요청 완료!</h3>
    <p className="text-sm text-gray-500 text-center">요청이 접수되었습니다.<br/>곧 견적서가 작성됩니다.</p>
    <button onClick={onReset} className="mt-2 px-6 py-2 text-sm font-medium text-gray-600 border border-gray-200 rounded-full hover:bg-gray-50 transition-colors">
      새 견적 요청
    </button>
  </div>
);

// ── 탭 1: 메시지 ──────────────────────────────────────────────────────────────
const MessageTab = ({ onSuccess }) => {
  const [message, setMessage] = useState("");
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    if (!message.trim()) return;
    setLoading(true);
    try {
      await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ source_type: "message", content: message }),
      });
      onSuccess();
    } catch {
      alert("전송 실패. 인터넷 연결을 확인해주세요.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="space-y-4">
      <p className="text-sm text-gray-500">견적 내용을 자유롭게 작성해주세요.</p>
      <textarea
        className="w-full h-44 p-4 text-sm text-gray-700 bg-gray-50 border border-gray-100 rounded-2xl resize-none focus:outline-none focus:ring-2 focus:ring-indigo-200 placeholder-gray-300 transition"
        placeholder="예) ABC회사 홈페이지 리뉴얼 10페이지, 반응형 제작 견적 부탁드립니다..."
        value={message}
        onChange={e => setMessage(e.target.value)}
      />
      <button
        onClick={handleSubmit}
        disabled={!message.trim() || loading}
        className="w-full py-3 flex items-center justify-center gap-2 bg-indigo-500 text-white text-sm font-medium rounded-2xl hover:bg-indigo-600 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
      >
        <SendIcon />
        {loading ? "전송 중..." : "견적 요청 보내기"}
      </button>
    </div>
  );
};

// ── 탭 2: 음성 ───────────────────────────────────────────────────────────────
const VoiceTab = ({ onSuccess }) => {
  const [recording, setRecording] = useState(false);
  const [audioBlob, setAudioBlob] = useState(null);
  const [audioUrl, setAudioUrl] = useState(null);
  const [duration, setDuration] = useState(0);
  const [loading, setLoading] = useState(false);
  const mrRef = useRef(null);
  const chunksRef = useRef([]);
  const timerRef = useRef(null);

  useEffect(() => {
    if (recording) timerRef.current = setInterval(() => setDuration(d => d + 1), 1000);
    else clearInterval(timerRef.current);
    return () => clearInterval(timerRef.current);
  }, [recording]);

  const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  const start = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mr = new MediaRecorder(stream);
      mrRef.current = mr;
      chunksRef.current = [];
      mr.ondataavailable = e => chunksRef.current.push(e.data);
      mr.onstop = () => {
        const blob = new Blob(chunksRef.current, { type: "audio/webm" });
        setAudioBlob(blob);
        setAudioUrl(URL.createObjectURL(blob));
        stream.getTracks().forEach(t => t.stop());
      };
      mr.start();
      setRecording(true);
      setDuration(0);
    } catch {
      alert("마이크 접근 권한이 필요합니다.");
    }
  };

  const stop = () => { mrRef.current?.stop(); setRecording(false); };
  const reset = () => { setAudioBlob(null); setAudioUrl(null); setDuration(0); };

  const handleSubmit = async () => {
    if (!audioBlob) return;
    setLoading(true);
    try {
      const fd = new FormData();
      fd.append("source_type", "voice");
      fd.append("audio", audioBlob, "voice.webm");
      await fetch(WEBHOOK_URL, { method: "POST", body: fd });
      onSuccess();
    } catch {
      alert("전송 실패. 인터넷 연결을 확인해주세요.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="space-y-4">
      <p className="text-sm text-gray-500">버튼을 눌러 음성으로 견적 내용을 말해주세요.</p>
      <div className="flex flex-col items-center py-6 space-y-5">
        <button
          onClick={recording ? stop : start}
          disabled={!!audioBlob}
          className={`w-24 h-24 rounded-full flex items-center justify-center text-white shadow-lg transition-all duration-200 ${
            recording ? "bg-red-500 scale-110 animate-pulse" : audioBlob ? "bg-gray-300 cursor-not-allowed" : "bg-indigo-500 hover:scale-105"
          }`}
        >
          {recording ? <span className="text-2xl">⏹</span> : <MicIcon recording={false} />}
        </button>
        {recording && (
          <div className="flex items-center gap-2 text-red-500 text-sm font-medium">
            <span className="w-2 h-2 bg-red-500 rounded-full animate-pulse" />
            녹음 중 {fmt(duration)}
          </div>
        )}
        {!recording && !audioBlob && <p className="text-xs text-gray-400">버튼을 눌러 녹음 시작</p>}
        {audioBlob && (
          <div className="w-full bg-gray-50 rounded-2xl p-4 space-y-2">
            <div className="flex items-center justify-between">
              <span className="text-sm text-gray-600 font-medium">녹음 완료 · {fmt(duration)}</span>
              <button onClick={reset} className="text-gray-400 hover:text-red-400 transition-colors"><TrashIcon /></button>
            </div>
            <audio controls className="w-full" src={audioUrl} />
          </div>
        )}
      </div>
      <button
        onClick={handleSubmit}
        disabled={!audioBlob || loading}
        className="w-full py-3 flex items-center justify-center gap-2 bg-indigo-500 text-white text-sm font-medium rounded-2xl hover:bg-indigo-600 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
      >
        <SendIcon />
        {loading ? "전송 중..." : "음성 견적 요청 보내기"}
      </button>
    </div>
  );
};

// ── 탭 3: 폼 (Tally 견적서 양식) ─────────────────────────────────────────────
const EMPTY_ITEM = { name: "", count: "", price: "" };

const FormTab = ({ onSuccess }) => {
  const today = new Date().toISOString().split("T")[0];
  const [clientCompany, setClientCompany] = useState("");
  const [projectDate, setProjectDate] = useState(today);
  const [items, setItems] = useState([{ ...EMPTY_ITEM }]);
  const [loading, setLoading] = useState(false);

  const setItem = (idx, field, value) =>
    setItems(prev => prev.map((it, i) => i === idx ? { ...it, [field]: value } : it));

  const isValid = clientCompany.trim() && items[0].name.trim();

  const handleSubmit = async () => {
    if (!isValid) return;
    setLoading(true);
    const fields = [
      { label: "고객사명",    value: clientCompany },
      { label: "견적서 날짜", value: projectDate   },
    ];
    items.forEach((it, idx) => {
      if (!it.name) return;
      const n = idx + 1;
      fields.push({ label: `품목 ${n} - 품목명`, value: it.name });
      fields.push({ label: `품목 ${n} - 수량`,   value: it.count ? Number(it.count) : 1 });
      fields.push({ label: `품목 ${n} - 단가`,   value: it.price ? Number(it.price) : 0 });
    });
    try {
      await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ data: { fields } }),
      });
      onSuccess();
    } catch {
      alert("전송 실패. 인터넷 연결을 확인해주세요.");
    } finally {
      setLoading(false);
    }
  };

  const inp = "w-full px-4 py-2.5 text-sm text-gray-700 bg-white border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-200 placeholder-gray-300 transition";

  return (
    <div className="space-y-5 pb-4">
      <div className="space-y-3">
        <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider">기본 정보</p>
        <input className={inp} placeholder="고객사명 *" value={clientCompany} onChange={e => setClientCompany(e.target.value)} />
        <div>
          <label className="text-xs text-gray-400 mb-1 block">견적서 날짜</label>
          <input type="date" className={inp} value={projectDate} onChange={e => setProjectDate(e.target.value)} />
        </div>
      </div>

      <div className="space-y-3">
        <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider">품목 (최대 4개)</p>
        {items.map((item, idx) => (
          <div key={idx} className="bg-gray-50 rounded-2xl p-3 space-y-2">
            <div className="flex items-center justify-between">
              <span className="text-xs font-medium text-gray-500">품목 {idx + 1}</span>
              {items.length > 1 && (
                <button onClick={() => setItems(prev => prev.filter((_, i) => i !== idx))} className="text-gray-300 hover:text-red-400 transition-colors">
                  <TrashIcon />
                </button>
              )}
            </div>
            <input className={inp} placeholder={`품목명${idx === 0 ? " *" : ""}`} value={item.name} onChange={e => setItem(idx, "name", e.target.value)} />
            <div className="flex gap-2">
              <input className={inp} placeholder="수량" type="number" min="1" value={item.count} onChange={e => setItem(idx, "count", e.target.value)} />
              <input className={inp} placeholder="단가 (원)" type="number" min="0" value={item.price} onChange={e => setItem(idx, "price", e.target.value)} />
            </div>
            {item.count && item.price && (
              <p className="text-right text-xs text-indigo-400 font-medium">
                소계: {(Number(item.count) * Number(item.price)).toLocaleString()}원
              </p>
            )}
          </div>
        ))}
        {items.length < 4 && (
          <button onClick={() => setItems(prev => [...prev, { ...EMPTY_ITEM }])} className="w-full py-2 text-sm text-indigo-400 border border-dashed border-indigo-200 rounded-xl hover:bg-indigo-50 transition-colors">
            + 품목 추가
          </button>
        )}
        {items.some(it => it.count && it.price) && (
          <div className="flex justify-between items-center px-1 pt-1 border-t border-gray-100">
            <span className="text-sm font-semibold text-gray-600">합계</span>
            <span className="text-sm font-bold text-indigo-600">
              {items.reduce((s, it) => s + (Number(it.count)||0) * (Number(it.price)||0), 0).toLocaleString()}원
            </span>
          </div>
        )}
      </div>

      <button
        onClick={handleSubmit}
        disabled={!isValid || loading}
        className="w-full py-3 flex items-center justify-center gap-2 bg-indigo-500 text-white text-sm font-medium rounded-2xl hover:bg-indigo-600 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
      >
        <SendIcon />
        {loading ? "전송 중..." : "견적서 요청 보내기"}
      </button>
    </div>
  );
};

// ── 메인 앱 ──────────────────────────────────────────────────────────────────
const TABS = [
  { id: "message", label: "메시지", Icon: MessageIcon },
  { id: "voice",   label: "음성",   Icon: MicIcon    },
  { id: "form",    label: "폼",     Icon: FormIcon   },
];

function App() {
  const [tab, setTab] = useState("message");
  const [success, setSuccess] = useState(false);

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-50 to-indigo-50 flex items-start justify-center safe-top">
      <div className="w-full max-w-md bg-white shadow-xl min-h-screen flex flex-col">
        {/* 헤더 */}
        <div className="px-6 pt-10 pb-4">
          <p className="text-xs font-semibold text-indigo-400 uppercase tracking-widest">견적 요청</p>
          <h1 className="text-2xl font-bold text-gray-800 mt-1">무엇을 도와드릴까요?</h1>
          <p className="text-sm text-gray-400 mt-1">원하는 방식으로 견적을 요청해보세요</p>
        </div>

        {/* 탭 */}
        <div className="px-6">
          <div className="flex bg-gray-50 rounded-2xl p-1 gap-1">
            {TABS.map(({ id, label, Icon }) => (
              <button
                key={id}
                onClick={() => { setTab(id); setSuccess(false); }}
                className={`flex-1 flex items-center justify-center gap-1.5 py-2.5 text-sm font-medium rounded-xl transition-all duration-200 ${
                  tab === id ? "bg-white text-indigo-600 shadow-sm" : "text-gray-400 hover:text-gray-600"
                }`}
              >
                <Icon recording={tab === id && id === "voice"} />
                <span>{label}</span>
              </button>
            ))}
          </div>
        </div>

        {/* 컨텐츠 */}
        <div className="px-6 py-6 flex-1 overflow-y-auto safe-bottom">
          {success ? (
            <SuccessScreen onReset={() => { setSuccess(false); setTab("message"); }} />
          ) : (
            <>
              {tab === "message" && <MessageTab onSuccess={() => setSuccess(true)} />}
              {tab === "voice"   && <VoiceTab   onSuccess={() => setSuccess(true)} />}
              {tab === "form"    && <FormTab    onSuccess={() => setSuccess(true)} />}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
// Service Worker 등록
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(r => console.log('SW registered:', r.scope))
      .catch(e => console.error('SW error:', e));
  });
}
</script>
</body>
</html>
